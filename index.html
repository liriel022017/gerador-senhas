<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gerador de Senhas</title>

  <!-- Link para o CSS externo -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Gerador de Senhas</h1>

    <label for="length">Tamanho da senha:</label>
    <input type="number" id="length" value="12" min="4" max="64" />

    <label><input type="checkbox" id="uppercase" checked /> Incluir letras maiúsculas</label>
    <label><input type="checkbox" id="lowercase" checked /> Incluir letras minúsculas</label>
    <label><input type="checkbox" id="numbers" checked /> Incluir números</label>
    <label><input type="checkbox" id="symbols" /> Incluir símbolos</label>

    <button id="generate">🔐 Gerar Senha</button>

    <h2 class="strength-title">Nível de Segurança:</h2>
    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill"></div>
    </div>

    <div class="password" id="result" title="Clique para copiar"></div>
    <button id="copyBtn">📋 Copiar senha</button>
    <div class="copy-msg" id="copyMsg">Senha copiada!</div>
  </div>

  <!-- Link para o JS externo -->
  <script src="js/script.js"></script>
</body>
</html>
